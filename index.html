<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>I have something to ask you ❤️</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="loading">

  <!-- ══════════════════════════════════════════
       LOADING SCREEN
  ══════════════════════════════════════════ -->
  <div id="loader" class="loader-wrap" aria-hidden="true">
    <div class="loader-heart">
      <svg viewBox="0 0 100 90" xmlns="http://www.w3.org/2000/svg">
        <path d="M50 85 C20 60 5 45 5 28 A22 22 0 0 1 50 18 A22 22 0 0 1 95 28 C95 45 80 60 50 85Z"/>
      </svg>
    </div>
    <p class="loader-text">Loading something special…</p>
  </div>

  <!-- ══════════════════════════════════════════
       FLOATING HEARTS CANVAS (background)
  ══════════════════════════════════════════ -->
  <canvas id="heartsCanvas" aria-hidden="true"></canvas>

  <!-- ══════════════════════════════════════════
       DARK MODE TOGGLE
  ══════════════════════════════════════════ -->
  <button id="darkToggle" class="icon-btn" aria-label="Toggle dark mode" title="Dark mode">🌙</button>

  <!-- ══════════════════════════════════════════
       MUSIC TOGGLE
  ══════════════════════════════════════════ -->
  <button id="musicToggle" class="icon-btn music-btn" aria-label="Toggle music" title="Play music">🎵</button>

  <!-- Background music — replace src with your own .mp3 URL -->
  <audio id="bgMusic" loop preload="none">
    <source src="https://cdn.pixabay.com/audio/2023/05/16/audio_ab5b265b0b.mp3" type="audio/mpeg" />
  </audio>

  <!-- ══════════════════════════════════════════
       SCREEN 1 — INTRO
  ══════════════════════════════════════════ -->
  <section id="screen-intro" class="screen active" role="main">
    <div class="card intro-card">
      <div class="intro-emoji pulse-anim">❤️</div>
      <h1 class="intro-title" id="introTitle"></h1>
      <p class="intro-sub" id="introSub"></p>
      <button id="btnContinue" class="btn btn-primary bounce-btn" style="opacity:0">
        Continue ✨
      </button>
    </div>
  </section>

  <!-- ══════════════════════════════════════════
       SCREEN 2 — THE QUESTION
  ══════════════════════════════════════════ -->
  <section id="screen-question" class="screen" role="main" aria-label="Date question">
    <div class="card question-card">
      <h2 class="question-title">Will you go on a date with me? ❤️</h2>
      <p id="funnyMessage" class="funny-msg" aria-live="polite"></p>
      <div class="btn-group">
        <button id="btnYes" class="btn btn-yes bounce-btn" aria-label="Yes I will">
          YES ❤️
        </button>
      </div>
    </div>
    <!-- NO button floats freely — position set by JS -->
    <button id="btnNo" class="btn btn-no" aria-label="No">
      NO 🙈
    </button>
  </section>

  <!-- ══════════════════════════════════════════
       SCREEN 3 — YES CELEBRATION
  ══════════════════════════════════════════ -->
  <section id="screen-yes" class="screen" role="main" aria-label="She said yes">
    <canvas id="confettiCanvas" aria-hidden="true"></canvas>
    <div class="card yes-card">
      <div class="yay-emoji bounce-big">🎉</div>
      <h2 class="yay-title">YAY!! ❤️</h2>
      <p class="yay-sub">Now let's plan our perfect date…</p>
      <button id="btnPlanDate" class="btn btn-primary bounce-btn">
        Plan Our Date 📅
      </button>
    </div>
  </section>

  <!-- ══════════════════════════════════════════
       SCREEN 4 — DATE PICKER
  ══════════════════════════════════════════ -->
  <section id="screen-date" class="screen" role="main" aria-label="Pick a date">
    <div class="card date-card">
      <h2 class="section-title">Pick a Day & Time 📅</h2>
      <div class="field-group">
        <label for="datePicker" class="field-label">📆 Date</label>
        <input type="date" id="datePicker" class="field-input" />
      </div>
      <div class="field-group">
        <label for="timePicker" class="field-label">⏰ Time</label>
        <input type="time" id="timePicker" class="field-input" />
      </div>
      <button id="btnToPlace" class="btn btn-primary bounce-btn">
        Next → Choose a Place ✨
      </button>
    </div>
  </section>

  <!-- ══════════════════════════════════════════
       SCREEN 5 — PLACE PICKER
  ══════════════════════════════════════════ -->
  <section id="screen-place" class="screen" role="main" aria-label="Pick a place">
    <div class="card place-card">
      <h2 class="section-title">Where should we go? 🗺️</h2>
      <div class="places-grid" id="placesGrid">
        <!-- Place cards injected by JS -->
      </div>
      <button id="btnToFinal" class="btn btn-primary bounce-btn" disabled>
        Let's Do It! 💕
      </button>
    </div>
  </section>

  <!-- ══════════════════════════════════════════
       SCREEN 6 — FINAL SUMMARY
  ══════════════════════════════════════════ -->
  <section id="screen-final" class="screen" role="main" aria-label="Our date summary">
    <div class="card final-card">
      <div class="final-heart-wrap" aria-hidden="true">
        <svg class="final-heart" viewBox="0 0 100 90" xmlns="http://www.w3.org/2000/svg">
          <path d="M50 85 C20 60 5 45 5 28 A22 22 0 0 1 50 18 A22 22 0 0 1 95 28 C95 45 80 60 50 85Z"/>
        </svg>
      </div>
      <h2 class="final-title">Our Date ❤️</h2>
      <div class="summary-box">
        <div class="summary-row">
          <span class="summary-icon">📆</span>
          <span id="summaryDate" class="summary-val">—</span>
        </div>
        <div class="summary-row">
          <span class="summary-icon">⏰</span>
          <span id="summaryTime" class="summary-val">—</span>
        </div>
        <div class="summary-row">
          <span class="summary-icon">📍</span>
          <span id="summaryPlace" class="summary-val">—</span>
        </div>
      </div>
      <p class="final-msg">I can't wait to spend this special day with you ❤️</p>
      <p class="final-love">I love you. 💕</p>
    </div>
  </section>

  <script src="script.js"></script>
</body>
</html>
